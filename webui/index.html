<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilibili 下载器 v3.2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #f6f7fb 0%, #eef0f7 100%); min-height: 100vh; display: flex; justify-content: center; padding: 30px 15px; }
.container { max-width: 700px; width: 100%; }
.header { text-align: center; margin-bottom: 25px; }
.logo { width: 60px; height: 60px; background: linear-gradient(135deg, #FB7299, #FF8EB3); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; color: white; box-shadow: 0 4px 15px rgba(251, 114, 153, 0.3); margin-bottom: 10px; }
h1 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #FB7299, #FF6B8A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { color: #999; font-size: 13px; margin-top: 4px; }
.card { background: white; border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.card-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
input[type="text"], select { width: 100%; padding: 11px 14px; border: 1.5px solid #e8e8ea; border-radius: 10px; font-size: 14px; background: #fafbfc; color: #333; outline: none; transition: border 0.2s; font-family: inherit; }
input:focus, select:focus { border-color: #FB7299; }
.btn { padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
.btn-paste { background: #f0f0f2; color: #666; }
.btn-paste:hover { background: #e4e4e6; }
.btn-browse { background: #f0f0f2; color: #666; margin-left: 8px; }
.btn-primary { background: linear-gradient(135deg, #FB7299, #FF6B8A); color: white; width: 100%; padding: 14px; font-size: 16px; font-weight: 700; border-radius: 14px; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(251, 114, 153, 0.3); margin-top: 6px; }
.btn-primary:hover { box-shadow: 0 6px 20px rgba(251, 114, 153, 0.45); transform: translateY(-1px); }
.btn-primary:disabled { background: #e0e0e0; color: #aaa; box-shadow: none; transform: none; cursor: not-allowed; }
.btn-login { background: #00A1D6; color: white; width: 100%; padding: 12px; font-size: 14px; border-radius: 10px; font-weight: 600; margin-top: 8px; }
.btn-login:hover { background: #00B5E5; }
.checkbox-group { display: flex; gap: 20px; }
.checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
.info-preview { display: flex; gap: 14px; }
.info-preview img { width: 110px; height: 68px; border-radius: 8px; object-fit: cover; }
.progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #FB7299, #00A1D6); border-radius: 3px; width: 0%; transition: width 0.3s; }
.status-bar { text-align: center; color: #999; font-size: 12px; margin-top: 10px; }
.hidden { display: none; }
.video-preview-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-top: 8px; }
.video-preview-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.partial-warning { background: #fff3cd; border: 1px solid #ffc107; padding: 12px; border-radius: 10px; margin: 12px 0; font-size: 13px; color: #856404; display: none; }
.cookie-status { font-size: 12px; margin-top: 6px; color: #666; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🎬</div>
        <h1>Bilibili 下载器 v3.2</h1>
        <p class="subtitle">粘贴链接 · 选择内容 · 开始下载</p>
    </div>

    <!-- 链接输入 -->
    <div class="card">
        <div class="card-title">📎 视频链接</div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="urlInput" placeholder="粘贴 B站视频链接...">
            <button class="btn btn-paste" onclick="pasteAndFetch()">粘贴</button>
        </div>
    </div>

    <!-- 视频信息 -->
    <div class="card hidden" id="infoCard">
        <div class="card-title">📺 视频信息</div>
        <div class="info-preview">
            <img id="coverImg" src="" alt="封面">
            <div>
                <div style="font-weight:600;" id="infoTitle"></div>
                <div style="font-size:12px;color:#999;" id="infoMeta"></div>
            </div>
        </div>
    </div>

    <!-- 视频预览 -->
    <div class="card hidden" id="previewCard">
        <div class="card-title">🎥 视频预览</div>
        <div class="video-preview-container">
            <iframe id="previewFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- 下载内容选择 -->
    <div class="card">
        <div class="card-title">📥 下载内容</div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="chkVideo" checked> 视频</label>
            <label><input type="checkbox" id="chkAudio" checked> 音频</label>
            <label><input type="checkbox" id="chkCover" checked> 封面</label>
        </div>
    </div>

    <!-- 清晰度 -->
    <div class="card">
        <div class="card-title">🎯 清晰度</div>
        <select id="qualitySelect"><option value="127">最高画质 (无损)</option></select>
    </div>

    <!-- 保存路径 -->
    <div class="card">
        <div class="card-title">📁 保存路径</div>
        <div style="display: flex; align-items: center;">
            <input type="text" id="pathInput" placeholder="默认: downloads 文件夹">
            <button class="btn btn-browse" onclick="selectFolder()">浏览</button>
        </div>
    </div>

    <!-- 一键登录卡片 -->
    <div class="card" id="loginCard">
        <div class="card-title">🔐 会员权限（下载充电/大会员视频）</div>
        <p style="font-size:12px; color:#666; margin-bottom:10px;">
            若自动登录失败，请先关闭所有 Edge/Chrome 浏览器窗口，然后点击下方按钮。
        </p>
        <button class="btn btn-login" id="autoLoginBtn" onclick="autoLogin()">一键获取浏览器登录</button>
        <div id="loginStatus" class="cookie-status"></div>
        <hr style="margin:12px 0; border: 0.5px solid #eee;">
        <p style="font-size:12px; color:#666;">高级：手动粘贴 Cookie（<a href="#" onclick="toggleManualCookie();return false;">展开</a>）</p>
        <div id="manualCookieArea" class="hidden" style="margin-top:8px;">
            <textarea id="cookieText" rows="2" style="width:100%; padding:8px; border:1px solid #e8e8ea; border-radius:8px; font-size:12px;" placeholder="粘贴从浏览器“网络”请求头中复制的完整 Cookie"></textarea>
            <button class="btn btn-paste" style="margin-top:6px;" onclick="pasteCookie()">从剪贴板粘贴</button>
        </div>
    </div>

    <!-- 下载不完整的警告 -->
    <div id="partialWarning" class="partial-warning">
        ⚠️ <span id="partialWarningText"></span>
    </div>

    <!-- 下载按钮 -->
    <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">开始下载 一w一</button>

    <!-- 进度条 -->
    <div class="card hidden" id="progressCard">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div style="font-size:12px;color:#999;margin-top:4px;" id="progressText"></div>
    </div>

    <div class="status-bar" id="statusText">就绪</div>
</div>

<script>
let currentBV="", currentCID=0, taskId="", progressTimer=null;

document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key === 'Enter') fetchInfo(); });

async function pasteAndFetch() {
    try { const t = await navigator.clipboard.readText(); document.getElementById('urlInput').value = t; fetchInfo(); } catch { fetchInfo(); }
}

function toggleManualCookie() {
    document.getElementById('manualCookieArea').classList.toggle('hidden');
}

async function autoLogin() {
    const btn = document.getElementById('autoLoginBtn');
    btn.disabled = true;
    btn.textContent = '正在获取...';
    document.getElementById('loginStatus').textContent = '';
    try {
        const r = await fetch('/api/auto-login');
        const d = await r.json();
        if (d.ok) {
            document.getElementById('loginStatus').textContent = '✅ ' + d.message;
        } else {
            document.getElementById('loginStatus').textContent = '❌ ' + d.error;
        }
    } catch(e) {
        document.getElementById('loginStatus').textContent = '❌ 网络错误';
    }
    btn.disabled = false;
    btn.textContent = '一键获取浏览器登录';
}

async function pasteCookie() {
    try {
        const t = await navigator.clipboard.readText();
        document.getElementById('cookieText').value = t;
    } catch { }
}

async function fetchInfo() {
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return;
    setStatus("正在获取视频信息...");
    const r = await fetch('/api/info?url='+encodeURIComponent(url));
    const d = await r.json();
    if(!d.ok) { setStatus("获取失败: "+d.error); return; }
    currentBV=d.bv; currentCID=d.cid;
    document.getElementById('infoCard').classList.remove('hidden');
    document.getElementById('coverImg').src = d.cover;
    document.getElementById('infoTitle').textContent = d.title;
    document.getElementById('infoMeta').textContent = `UP主: ${d.owner} | ${formatDuration(d.duration)}`;

    document.getElementById('previewCard').classList.remove('hidden');
    document.getElementById('previewFrame').src = `https://player.bilibili.com/player.html?bvid=${d.bv}&page=1&high_quality=1&danmaku=0`;

    loadQualities();
    setStatus("就绪");
}

async function loadQualities() {
    try {
        const r = await fetch(`/api/qualities?bv=${currentBV}&cid=${currentCID}`);
        const d = await r.json();
        if(d.ok) {
            const sel = document.getElementById('qualitySelect');
            sel.innerHTML = '';
            d.qualities.forEach(q => {
                const opt = document.createElement('option');
                opt.value = q.qn; opt.textContent = q.desc;
                if(q.qn === 127) opt.selected = true;
                sel.appendChild(opt);
            });
        }
    } catch {}
}

async function selectFolder() {
    try {
        const r = await fetch('/api/select-folder', { method:'POST' });
        const d = await r.json();
        if(d.ok) document.getElementById('pathInput').value = d.folder;
    } catch {}
}

async function startDownload() {
    if(!currentBV) return alert('请先粘贴有效的B站视频链接');
    const types = [];
    if(document.getElementById('chkVideo').checked) types.push('video');
    if(document.getElementById('chkAudio').checked) types.push('audio');
    if(document.getElementById('chkCover').checked) types.push('cover');
    if(types.length === 0) return alert('请至少选择一项下载内容');

    const qn = parseInt(document.getElementById('qualitySelect').value) || 127;
    const savePath = document.getElementById('pathInput').value.trim();
    const manualCookie = document.getElementById('cookieText').value.trim();
    const btn = document.getElementById('downloadBtn');
    btn.disabled = true;
    btn.textContent = '下载中...';
    document.getElementById('progressCard').classList.remove('hidden');
    document.getElementById('partialWarning').style.display = 'none';
    setStatus("正在启动下载...");

    const r = await fetch('/api/download', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({url:document.getElementById('urlInput').value.trim(), qn, types, save_path: savePath, manual_cookie: manualCookie})
    });
    const d = await r.json();
    if(d.ok) {
        taskId = d.task_id;
        startProgressPolling();
    } else {
        setStatus("下载失败: "+d.error);
        btn.disabled = false;
        btn.textContent = '开始下载 一w一';
    }
}

function startProgressPolling() {
    if(progressTimer) clearInterval(progressTimer);
    progressTimer = setInterval(async () => {
        const r = await fetch('/api/progress?task_id='+taskId);
        const d = await r.json();
        if(d.ok && d.progress) {
            if(d.progress.status === 'complete') {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = '下载完成 DA☆ZE';
                clearInterval(progressTimer);
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = '开始下载 一w一';
                setStatus(`完成！文件夹: ${d.progress.folder}`);
            } else if(d.progress.status === 'partial') {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = '下载可能不完整';
                clearInterval(progressTimer);
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = '重新下载';
                document.getElementById('partialWarningText').textContent = d.progress.message || '检测到视频可能不完整，请先使用“一键获取浏览器登录”后重试。';
                document.getElementById('partialWarning').style.display = 'block';
                setStatus("下载不完整，请按提示操作");
            } else if(d.progress.status === 'error') {
                setStatus("下载失败: "+d.progress.error);
                clearInterval(progressTimer);
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = '开始下载 一w一';
            } else {
                const values = Object.values(d.progress).filter(v => typeof v === 'number');
                if(values.length > 0) {
                    const pct = Math.round(values.reduce((a,b)=>a+b,0)/values.length*100);
                    document.getElementById('progressFill').style.width = pct+'%';
                    document.getElementById('progressText').textContent = pct+'%';
                }
            }
        }
    }, 500);
}

function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
function formatDuration(sec) { const m = Math.floor(sec/60); const s = sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }
</script>
</body>
</html>
